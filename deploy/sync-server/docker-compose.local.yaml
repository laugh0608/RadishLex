name: radishlex-sync-local

services:
  sync-server:
    image: radishlex-sync-server:local
    build:
      context: ../../server/sync-server
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    environment:
      RADISHLEX_SYNC_LISTEN: "0.0.0.0:7319"
      RADISHLEX_SYNC_METADATA_PATH: "/var/lib/radishlex/sync-server/sync-server.sqlite"
      RADISHLEX_SYNC_BLOB_DIR: "/var/lib/radishlex/sync-server/objects"
      RADISHLEX_SYNC_MAX_OBJECT_BYTES: "16777216"
      RADISHLEX_SYNC_RECOVERY_READS_PER_HOUR: "12"
    expose:
      - "7319"
    volumes:
      - sync-server-data:/var/lib/radishlex
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  sync-gateway:
    image: caddy:2-alpine
    init: true
    restart: unless-stopped
    environment:
      RADISHLEX_SYNC_PUBLIC_HOST: "localhost"
      RADISHLEX_SYNC_PORT: "7319"
    depends_on:
      - sync-server
    ports:
      - "127.0.0.1:7319:7319"
    volumes:
      - ./caddy/local.Caddyfile:/etc/caddy/Caddyfile:ro
      - sync-gateway-data:/data
      - sync-gateway-config:/config
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  sync-server-data:
  sync-gateway-data:
  sync-gateway-config:
